[model]
name = "qwen3.5-122b-a10b"
hf_id = "Sehyo/Qwen3.5-122B-A10B-NVFP4"
params = "122B"
active_params = "10B"
architecture = "Gated DeltaNet + Full Attention + MoE"

layers_total = 48
layers_linear_attention = 36
layers_full_attention = 12
layer_pattern = "3:1 (linear, linear, linear, full)"

moe_experts = 256
moe_topk = 8
moe_intermediate = 1024
shared_expert_intermediate = 1024

hidden_dim = 3072
head_dim = 256
q_heads = 32
kv_heads = 2

linear_attn_key_heads = 16
linear_attn_key_dim = 128
linear_attn_value_heads = 64
linear_attn_value_dim = 128
linear_conv_kernel = 4

vocab_size = 248320
max_position_embeddings = 262144
rope_theta = 10000000
partial_rotary_factor = 0.25
attn_output_gate = true

mtp_layers = 1
mtp_type = "full_attention"
vision = true

# Recommended sampling defaults per category (from Qwen3.5 model card).
[sampling.thinking_text]
temperature = 1.0
top_p = 0.95
top_k = 20
presence_penalty = 1.5

[sampling.thinking_coding]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0

[sampling.non_thinking]
temperature = 1.0
top_p = 1.0
top_k = 20
presence_penalty = 2.0

[behavior]
# Content-loop watchdog disabled: 2026-05-05 chess-game stress sweep
# showed Qwen3.5-122B-A10B EP=2 finishes naturally with EOS on long-code
# prompts (33.3 t/s, finish=stop, zero loops). Only the dense Qwen 27B
# variants need the watchdog.
enable_loop_watchdog = false
# Thinking on by default for all Qwen reasoning-tier models (sweep 2026-05-20).
thinking_default = true
thinking_in_tools = false
max_thinking_budget = 512

[[model_types]]
model_type = "qwen3_5_moe"
hidden_size = 3072

# Qwen3.6-derived checkpoints (e.g. Sehyo/Qwen3.5-122B-A10B-NVFP4 with
# mrope_interleaved=true) get their model_type rewritten to qwen3_6_moe
# by parse_config. Accept the rewritten form at the same hidden_size so
# the 122B target handles both Qwen3.5 and Qwen3.6-flavored 122B
# checkpoints from the same kernel dir.
[[model_types]]
model_type = "qwen3_6_moe"
hidden_size = 3072

[kernel]
moe_gate_shmem_bytes = 6144   # hidden_dim(3072) * sizeof(bf16)
